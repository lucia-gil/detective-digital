spring.application.name=detector-trampas
server.port=${PORT:8080}

# Anthropic API Key — pon tu key real aquí o usa variable de entorno
# Opción 1: directo (solo para desarrollo local)
anthropic.api.key=tu-api-key-aqui

# Opción 2: variable de entorno (recomendado para producción)
# En tu terminal: export ANTHROPIC_API_KEY=sk-ant-...
# anthropic.api.key=${ANTHROPIC_API_KEY}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.detectortrampas=DEBUG
